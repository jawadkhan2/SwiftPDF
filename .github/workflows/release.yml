name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/release (e.g. v1.0.0)"
        required: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            pdfium_asset: pdfium-mac-arm64.tgz
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            pdfium_asset: pdfium-mac-x64.tgz
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            rust_target: ""
            pdfium_asset: ""
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend deps
        run: npm ci

      - name: Download macOS PDFium
        if: matrix.pdfium_asset != ''
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src-tauri/resources/pdfium
          curl -L -o pdfium.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/${{ matrix.pdfium_asset }}"
          tar -xzf pdfium.tgz -C /tmp/ lib/libpdfium.dylib
          cp /tmp/lib/libpdfium.dylib src-tauri/resources/pdfium/libpdfium.dylib

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "SwiftPDF ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "Download the installer for your platform below."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
